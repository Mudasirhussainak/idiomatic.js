<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Todo App</title>
	<link rel="stylesheet" href="styles.css" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
	<noscript>This app requires JavaScript to function.</noscript>
	<header class="app-header">
		<h1>Todos</h1>
		<div class="theme-toggle">
			<button id="themeToggle" aria-label="Toggle dark mode" title="Toggle theme">🌙</button>
		</div>
	</header>

	<main class="container">
		<section class="new-todo">
			<form id="newTodoForm" autocomplete="off">
				<label class="sr-only" for="newTodoInput">Add a todo</label>
				<input id="newTodoInput" name="title" type="text" placeholder="What needs to be done?" required />
				<button type="submit" class="add-btn" aria-label="Add todo">Add</button>
			</form>
		</section>

		<section class="controls" aria-label="Todo controls">
			<div class="filters" role="group" aria-label="Filter todos">
				<button data-filter="all" class="filter is-active" aria-pressed="true">All</button>
				<button data-filter="active" class="filter" aria-pressed="false">Active</button>
				<button data-filter="completed" class="filter" aria-pressed="false">Completed</button>
			</div>
			<div class="bulk-actions">
				<button id="toggleAll" title="Toggle all" aria-label="Toggle all">Toggle All</button>
				<button id="clearCompleted" title="Clear completed" aria-label="Clear completed">Clear Completed</button>
			</div>
		</section>

		<section>
			<ul id="todoList" class="todo-list" aria-live="polite"></ul>
		</section>
	</main>

	<footer class="app-footer">
		<p>Local-only demo. Data saved in your browser.</p>
	</footer>

	<script src="script.js"></script>
</body>
</html>
